<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Servidor Web Java</title>
    <style>
        body{font-family:Arial,sans-serif;background:#fff;color:#222;margin:20px}
        main{max-width:700px}
        h1{color:#036}
        p{line-height:1.4}
        ul{padding-left:20px}
        a{color:#03c}
        img{margin-top:16px;width:180px;border:1px solid #ccc;display:block}
    </style>
</head>
<body>
<main>
    <h1>Servidor Web en Java</h1>
    <h2>Enlaces de prueba</h2>
    <ul>
        <li><a href="/hello">hello</a></li>
        <li><a href="/pi">pi</a></li>
        <li><a href="/greeting?name=Tomas">name</a></li>
    </ul>
    <p>Imagen por el servidor:</p>
    <img src="/images/server.png" alt="Imagen PNG del servidor">
</main>
</body>
</html>
